services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
    expose:
      - "8000"

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    ports:
      - "80:80"
    depends_on:
      - backend

